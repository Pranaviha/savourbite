<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Failed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}
body {
    background: #fdf2e9; /* Warm foodie background */
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.error-card {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 45px 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
}
.icon-circle {
    width: 70px;
    height: 70px;
    background: #ffe6e8;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 25px;
}
.icon-circle span {
    font-size: 24px;
    color: #ff4757; /* Tomato red */
}
h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 10px;
}
p {
    font-size: 0.95rem;
    color: #7f8c8d;
    margin-bottom: 35px;
    line-height: 1.5;
}
    </style>
</head>
<div class="error-card">
        <div class="icon-circle">
            <span>&#10060;</span>
        </div>
        <h1>SignIn Failed!</h1>
    </div>
</body>
</html>
